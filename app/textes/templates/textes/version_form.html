{% extends 'layout.html' %}
{% block title %}{{ 'Modifier' if version else 'Nouvelle' }} version{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h3 mb-1">{{ 'Modifier' if version else 'Nouvelle' }} version</h1>
      <p class="text-muted mb-0">
        <a href="{{ url_for('textes.detail', texte_id=texte.id) }}" class="text-decoration-none">{{ texte.code }} — {{ texte.titre[:80] }}</a>
      </p>
    </div>
    <a href="{{ url_for('textes.detail', texte_id=texte.id) }}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Retour</a>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Numéro de version <span class="text-danger">*</span></label>
            <input type="text" name="numero_version" class="form-control" value="{{ version.numero_version if version else '' }}" placeholder="e.g. 1, 2.1" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Date de publication</label>
            <input type="date" name="date_publication" class="form-control"
              value="{{ version.date_publication.strftime('%Y-%m-%d') if version and version.date_publication else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Statut</label>
            <select name="statut" class="form-select">
              <option value="projet" {% if version and version.statut == 'projet' %}selected{% endif %}>Projet</option>
              <option value="actif" {% if version and version.statut == 'actif' %}selected{% endif %}>Actif</option>
              <option value="archive" {% if version and version.statut == 'archive' %}selected{% endif %}>Archivé</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Version précédente</label>
            <select name="version_precedente_id" class="form-select">
              <option value="">— Aucune —</option>
              {% for v in versions %}
              <option value="{{ v.id }}" {% if version and version.version_precedente_id == v.id %}selected{% endif %}>
                v{{ v.numero_version }} ({{ v.date_publication.strftime('%d/%m/%Y') if v.date_publication else '-' }})
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="set_active" id="setActive" value="1"
                {% if version and version.texte.version_active_id == version.id %}checked{% endif %}>
              <label class="form-check-label" for="setActive">Définir comme version active</label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Préambule</label>
            <textarea name="preambule" class="form-control" rows="5">{{ version.preambule if version else '' }}</textarea>
          </div>
          <div class="col-12">
            <label class="form-label">Commentaire</label>
            <textarea name="commentaire_version" class="form-control" rows="3">{{ version.commentaire_version if version else '' }}</textarea>
          </div>
          <div class="col-12 pt-3 border-top">
            <button type="submit" class="btn btn-danger px-4">
              <i class="fas fa-save me-1"></i>{{ 'Enregistrer' if version else 'Créer la version' }}
            </button>
            <a href="{{ url_for('textes.detail', texte_id=texte.id) }}" class="btn btn-outline-secondary ms-2">Annuler</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
