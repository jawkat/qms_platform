{% extends 'layout.html' %}
{% block title %}HACCP - Rappels produits{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="fas fa-exclamation-circle me-2 text-danger"></i>Rappels produits</h1>
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#itemModal"><i class="fas fa-plus me-1"></i>Nouveau rappel</button>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr><th>Réf.</th><th>Produit</th><th>Lot</th><th>Date</th><th>Motif</th><th>Gravité</th><th>Statut</th><th>Actions</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouveau rappel</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="itemId" value="">
        <div class="row g-3">
          <div class="col-md-4"><label class="form-label">Référence</label><input type="text" id="f_reference" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Produit <span class="text-danger">*</span></label><input type="text" id="f_produit" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Lot</label><input type="text" id="f_lot" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Date rappel</label><input type="date" id="f_date" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Gravité</label><select id="f_gravite" class="form-select"><option value="critique">Critique</option><option value="majeure">Majeure</option><option value="mineure">Mineure</option></select></div>
          <div class="col-12"><label class="form-label">Motif <span class="text-danger">*</span></label><textarea id="f_motif" class="form-control" rows="2"></textarea></div>
          <div class="col-12"><label class="form-label">Actions menées</label><textarea id="f_actions" class="form-control" rows="2"></textarea></div>
          <div class="col-md-6"><div class="form-check"><input type="checkbox" id="f_client_notifie" class="form-check-input"><label class="form-check-label">Client notifié</label></div></div>
          <div class="col-md-6"><div class="form-check"><input type="checkbox" id="f_autorite_notifiee" class="form-check-input"><label class="form-check-label">Autorité notifiée</label></div></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-danger" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '{{ url_for("haccp.api_rappels") }}'; const CREATE = '{{ url_for("haccp.api_rappels_create") }}';
const UPDATE = '{{ url_for("haccp.api_rappels_update", item_id=0) }}'; const DELETE = '{{ url_for("haccp.api_rappels_delete", item_id=0) }}';
function load() {
  fetch(API).then(r=>r.json()).then(items => {
    const tbody = document.getElementById('tableBody');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Aucun rappel</td></tr>'; return; }
    tbody.innerHTML = items.map(r => `<tr>
      <td>${r.reference||''}</td><td>${r.produit||''}</td><td>${r.lot||''}</td>
      <td>${r.date_rappel ? new Date(r.date_rappel).toLocaleDateString('fr-FR') : ''}</td>
      <td class="text-truncate" style="max-width:200px">${r.motif||''}</td>
      <td><span class="badge bg-${r.gravite==='critique'?'danger':r.gravite==='majeure'?'warning':'info'}">${r.gravite||''}</span></td>
      <td><span class="badge bg-${r.statut==='en_cours'?'danger':r.statut==='termine'?'success':'warning'}">${r.statut||''}</span></td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  });
}
function saveItem() {
  const id = document.getElementById('itemId').value;
  const data = { reference: document.getElementById('f_reference').value, produit: document.getElementById('f_produit').value,
    lot: document.getElementById('f_lot').value, date_rappel: document.getElementById('f_date').value,
    motif: document.getElementById('f_motif').value, gravite: document.getElementById('f_gravite').value,
    actions_menées: document.getElementById('f_actions').value,
    client_notifie: document.getElementById('f_client_notifie').checked,
    autorite_notifiee: document.getElementById('f_autorite_notifiee').checked };
  const url = id ? UPDATE.replace('0', id) : CREATE;
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(r=>r.json()).then(r=>{ if(r.success) { bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide(); load(); resetForm(); } });
}
function edit(id) {
  fetch(API).then(r=>r.json()).then(items => {
    const r = items.find(x=>x.id===id); if(!r) return;
    document.getElementById('itemId').value = r.id; document.getElementById('f_reference').value = r.reference||'';
    document.getElementById('f_produit').value = r.produit||''; document.getElementById('f_lot').value = r.lot||'';
    document.getElementById('f_date').value = r.date_rappel || ''; document.getElementById('f_motif').value = r.motif||'';
    document.getElementById('f_gravite').value = r.gravite||'critique'; document.getElementById('f_actions').value = r.actions_menées||'';
    document.getElementById('f_client_notifie').checked = r.client_notifie||false;
    document.getElementById('f_autorite_notifiee').checked = r.autorite_notifiee||false;
    document.getElementById('modalTitle').textContent = 'Modifier le rappel';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  });
}
function del(id) { if(!confirm('Supprimer ?')) return; fetch(DELETE.replace('0',id), {method:'POST'}).then(r=>r.json()).then(r=>{if(r.success) load();}); }
function resetForm() { document.getElementById('itemId').value = ''; ['f_reference','f_produit','f_lot','f_date','f_motif','f_actions'].forEach(id => document.getElementById(id).value = ''); document.getElementById('f_gravite').value = 'critique'; document.getElementById('f_client_notifie').checked = false; document.getElementById('f_autorite_notifiee').checked = false; document.getElementById('modalTitle').textContent = 'Nouveau rappel'; }
document.addEventListener('DOMContentLoaded', load);
</script>
{% endblock %}
