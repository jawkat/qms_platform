{% extends 'layout.html' %}
{% block title %}HACCP - Enregistrements OPRP{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="fas fa-clipboard-check me-2 text-warning"></i>Enregistrements OPRP</h1>
    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#itemModal"><i class="fas fa-plus me-1"></i>Nouvel enregistrement</button>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr><th>OPRP</th><th>Élément</th><th>Date</th><th>Valeur</th><th>Conforme</th><th>Opérateur</th><th>Actions</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouvel enregistrement</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="itemId" value="">
        <div class="mb-3"><label class="form-label">OPRP</label><select id="f_oprp" class="form-select"></select></div>
        <div class="mb-3"><label class="form-label">Date/heure</label><input type="datetime-local" id="f_date" class="form-control"></div>
        <div class="row g-3 mb-3">
          <div class="col-md-6"><label class="form-label">Valeur <span class="text-danger">*</span></label><input type="text" id="f_valeur" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Unité</label><input type="text" id="f_unite" class="form-control" placeholder="°C, bar..."></div>
        </div>
        <div class="mb-3"><label class="form-label">Conforme</label><select id="f_conforme" class="form-select"><option value="1">Oui</option><option value="0">Non</option></select></div>
        <div class="mb-3"><label class="form-label">Opérateur</label><input type="text" id="f_operateur" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Action entreprise</label><textarea id="f_action" class="form-control" rows="2"></textarea></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-warning" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '{{ url_for("haccp.api_enregistrements_oprp") }}'; const CREATE = '{{ url_for("haccp.api_enregistrements_oprp_create") }}';
const UPDATE = '{{ url_for("haccp.api_enregistrements_oprp_update", item_id=0) }}'; const DELETE = '{{ url_for("haccp.api_enregistrements_oprp_delete", item_id=0) }}';
const OPRP_API = '{{ url_for("haccp.api_oprp") }}';
function load() {
  fetch(API).then(r=>r.json()).then(items => {
    const tbody = document.getElementById('tableBody');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Aucun enregistrement</td></tr>'; return; }
    tbody.innerHTML = items.map(r => `<tr>
      <td>${r.oprp_id||''}</td><td>${r.element||''}</td>
      <td>${r.date_controle ? new Date(r.date_controle).toLocaleString('fr-FR') : ''}</td>
      <td>${r.valeur||''} ${r.unite||''}</td>
      <td>${r.conforme ? '<span class="badge bg-success">Oui</span>' : '<span class="badge bg-danger">Non</span>'}</td>
      <td>${r.operateur||''}</td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  });
  fetch(OPRP_API).then(r=>r.json()).then(items => {
    const sel = document.getElementById('f_oprp');
    sel.innerHTML = '<option value="">-- Choisir --</option>' + items.map(r => `<option value="${r.id}">${r.element} ${r.etape ? '- ' + r.etape : ''}</option>`).join('');
  });
}
function saveItem() {
  const id = document.getElementById('itemId').value;
  const data = { oprp_id: document.getElementById('f_oprp').value, date_controle: document.getElementById('f_date').value ? new Date(document.getElementById('f_date').value).toISOString() : '',
    valeur: document.getElementById('f_valeur').value, unite: document.getElementById('f_unite').value,
    conforme: document.getElementById('f_conforme').value === '1', operateur: document.getElementById('f_operateur').value,
    action_entreprise: document.getElementById('f_action').value };
  const url = id ? UPDATE.replace('0', id) : CREATE;
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(r=>r.json()).then(r=>{ if(r.success) { bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide(); load(); resetForm(); } });
}
function edit(id) {
  fetch(API).then(r=>r.json()).then(items => {
    const r = items.find(x=>x.id===id); if(!r) return;
    document.getElementById('itemId').value = r.id; document.getElementById('f_oprp').value = r.oprp_id||'';
    document.getElementById('f_valeur').value = r.valeur||''; document.getElementById('f_unite').value = r.unite||'';
    document.getElementById('f_conforme').value = r.conforme ? '1' : '0'; document.getElementById('f_operateur').value = r.operateur||'';
    document.getElementById('f_action').value = r.action_entreprise||'';
    document.getElementById('modalTitle').textContent = "Modifier l'enregistrement";
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  });
}
function del(id) { if(!confirm('Supprimer ?')) return; fetch(DELETE.replace('0',id), {method:'POST'}).then(r=>r.json()).then(r=>{if(r.success) load();}); }
function resetForm() { document.getElementById('itemId').value = ''; ['f_valeur','f_unite','f_operateur','f_action'].forEach(id => document.getElementById(id).value = ''); document.getElementById('f_oprp').value = ''; document.getElementById('f_conforme').value = '1'; document.getElementById('modalTitle').textContent = 'Nouvel enregistrement'; }
document.addEventListener('DOMContentLoaded', load);
</script>
{% endblock %}
