{% extends 'layout.html' %}
{% block title %}HACCP - Analyse des dangers{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="fas fa-biohazard me-2 text-danger"></i>Analyse des dangers</h1>
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#itemModal"><i class="fas fa-plus me-1"></i>Nouvelle analyse</button>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr><th>Processus</th><th>Type</th><th>Danger</th><th>Cause</th><th>Grav</th><th>Prob</th><th>IPR</th><th>Significatif</th><th>Actions</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouvelle analyse</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="itemId" value="">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Type danger</label><select id="f_type" class="form-select"><option value="biologique">Biologique</option><option value="chimique">Chimique</option><option value="physique">Physique</option><option value="allergene">Allergène</option></select></div>
          <div class="col-md-6"><label class="form-label">Processus lié</label><select id="f_processus" class="form-select"></select></div>
          <div class="col-12"><label class="form-label">Danger <span class="text-danger">*</span></label><textarea id="f_danger" class="form-control" rows="2"></textarea></div>
          <div class="col-12"><label class="form-label">Cause</label><textarea id="f_cause" class="form-control" rows="2"></textarea></div>
          <div class="col-md-4"><label class="form-label">Gravité (1-5)</label><input type="number" id="f_gravite" class="form-control" min="1" max="5" value="1"></div>
          <div class="col-md-4"><label class="form-label">Probabilité (1-5)</label><input type="number" id="f_probabilite" class="form-control" min="1" max="5" value="1"></div>
          <div class="col-md-4"><label class="form-label">Détectabilité (1-5)</label><input type="number" id="f_detectabilite" class="form-control" min="1" max="5" value="1"></div>
          <div class="col-md-6"><label class="form-label">Mesure préventive</label><input type="text" id="f_mesure" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Justification</label><input type="text" id="f_justification" class="form-control"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-danger" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const DANGER_API = '/haccp/api/dangers';
const PROCESSUS_API = '/haccp/api/processus';

function load() {
  Promise.all([fetch(DANGER_API).then(r=>r.json()), fetch(PROCESSUS_API).then(r=>r.json())])
  .then(([items, processus]) => {
    window._processusList = processus;
    const procSel = document.getElementById('f_processus');
    procSel.innerHTML = '<option value="">-- Choisir --</option>' + processus.map(p => `<option value="${p.id}">${p.etape}</option>`).join('');
    const tbody = document.getElementById('tableBody');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">Aucune analyse de danger</td></tr>'; return; }
    tbody.innerHTML = items.map(r => `<tr>
      <td>${r.etape||''}</td><td><span class="badge bg-${r.type_danger==='biologique'?'success':r.type_danger==='chimique'?'warning':r.type_danger==='physique'?'info':'secondary'}">${r.type_danger||''}</span></td>
      <td>${r.danger||''}</td><td>${r.cause||''}</td><td>${r.gravite||'-'}</td><td>${r.probabilite||'-'}</td>
      <td><strong>${r.ipr||'-'}</strong></td>
      <td>${r.est_significatif ? '<span class="badge bg-danger">Oui</span>' : '<span class="badge bg-secondary">Non</span>'}</td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  });
}

function saveItem() {
  const id = document.getElementById('itemId').value;
  const data = {
    processus_id: document.getElementById('f_processus').value || null,
    type_danger: document.getElementById('f_type').value,
    danger: document.getElementById('f_danger').value,
    cause: document.getElementById('f_cause').value,
    gravite: parseInt(document.getElementById('f_gravite').value) || 1,
    probabilite: parseInt(document.getElementById('f_probabilite').value) || 1,
    detectabilite: parseInt(document.getElementById('f_detectabilite').value) || 1,
    mesure_preventive: document.getElementById('f_mesure').value,
    justification: document.getElementById('f_justification').value,
    est_significatif: (parseInt(document.getElementById('f_gravite').value)||1) * (parseInt(document.getElementById('f_probabilite').value)||1) * (parseInt(document.getElementById('f_detectabilite').value)||1) >= 15
  };
  const url = id ? `/haccp/api/dangers/${id}/update` : `${DANGER_API}/create`;
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(r=>r.json()).then(r=>{ if(r.success) { bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide(); load(); resetForm(); } });
}

function edit(id) {
  fetch(DANGER_API).then(r=>r.json()).then(items => {
    const r = items.find(x=>x.id===id); if(!r) return;
    document.getElementById('itemId').value = r.id;
    document.getElementById('f_type').value = r.type_danger||'biologique';
    document.getElementById('f_processus').value = r.processus_id||'';
    document.getElementById('f_danger').value = r.danger||'';
    document.getElementById('f_cause').value = r.cause||'';
    document.getElementById('f_gravite').value = r.gravite||1;
    document.getElementById('f_probabilite').value = r.probabilite||1;
    document.getElementById('f_detectabilite').value = r.detectabilite||1;
    document.getElementById('f_mesure').value = r.mesure_preventive||'';
    document.getElementById('f_justification').value = r.justification||'';
    document.getElementById('modalTitle').textContent = 'Modifier l\'analyse';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  });
}

function del(id) { if(!confirm('Supprimer cette analyse ?')) return; fetch(`/haccp/api/dangers/${id}/delete`, {method:'POST'}).then(r=>r.json()).then(r=>{if(r.success) load();}); }

function resetForm() {
  document.getElementById('itemId').value = '';
  ['f_danger','f_cause','f_mesure','f_justification'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_type').value = 'biologique';
  document.getElementById('f_processus').value = '';
  document.getElementById('f_gravite').value = 1;
  document.getElementById('f_probabilite').value = 1;
  document.getElementById('f_detectabilite').value = 1;
  document.getElementById('modalTitle').textContent = 'Nouvelle analyse';
}

document.addEventListener('DOMContentLoaded', load);
</script>
{% endblock %}
