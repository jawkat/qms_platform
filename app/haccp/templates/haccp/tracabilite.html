{% extends 'layout.html' %}
{% block title %}HACCP - Traçabilité{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="fas fa-sitemap me-2 text-secondary"></i>Traçabilité</h1>
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#itemModal"><i class="fas fa-plus me-1"></i>Nouveau lot</button>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr><th>Code lot</th><th>Produit</th><th>Date fab.</th><th>Expiration</th><th>Quantité</th><th>Fournisseur</th><th>Statut</th><th>Actions</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouveau lot</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="itemId" value="">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Code lot <span class="text-danger">*</span></label><input type="text" id="f_code" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Produit</label><input type="text" id="f_produit" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Date fabrication</label><input type="date" id="f_fab" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Date expiration</label><input type="date" id="f_exp" class="form-control"></div>
          <div class="col-md-4"><label class="form-label">Quantité</label><input type="text" id="f_quantite" class="form-control" placeholder="Kg, L, unités..."></div>
          <div class="col-md-6"><label class="form-label">Fournisseur</label><input type="text" id="f_fournisseur" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Lot fournisseur</label><input type="text" id="f_lot_fournisseur" class="form-control"></div>
          <div class="col-12"><label class="form-label">Matières utilisées</label><textarea id="f_matieres" class="form-control" rows="2"></textarea></div>
          <div class="col-12"><label class="form-label">Notes</label><textarea id="f_notes" class="form-control" rows="2"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-danger" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '{{ url_for("haccp.api_tracabilite") }}'; const CREATE = '{{ url_for("haccp.api_tracabilite_create") }}';
const UPDATE = '{{ url_for("haccp.api_tracabilite_update", item_id=0) }}'; const DELETE = '{{ url_for("haccp.api_tracabilite_delete", item_id=0) }}';
function load() {
  fetch(API).then(r=>r.json()).then(items => {
    const tbody = document.getElementById('tableBody');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Aucun lot</td></tr>'; return; }
    tbody.innerHTML = items.map(r => `<tr>
      <td><strong>${r.code_lot||''}</strong></td><td>${r.produit_nom||''}</td>
      <td>${r.date_fabrication ? new Date(r.date_fabrication).toLocaleDateString('fr-FR') : ''}</td>
      <td>${r.date_expiration ? new Date(r.date_expiration).toLocaleDateString('fr-FR') : ''}</td>
      <td>${r.quantite||''}</td><td>${r.fournisseur||''}</td>
      <td><span class="badge bg-${r.statut==='disponible'?'success':r.statut==='bloque'?'danger':'secondary'}">${r.statut||''}</span></td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  });
}
function saveItem() {
  const id = document.getElementById('itemId').value;
  const data = { code_lot: document.getElementById('f_code').value, produit_nom: document.getElementById('f_produit').value,
    date_fabrication: document.getElementById('f_fab').value, date_expiration: document.getElementById('f_exp').value,
    quantite: document.getElementById('f_quantite').value, fournisseur: document.getElementById('f_fournisseur').value,
    lot_fournisseur: document.getElementById('f_lot_fournisseur').value, matieres_utilisees: document.getElementById('f_matieres').value,
    notes: document.getElementById('f_notes').value };
  const url = id ? UPDATE.replace('0', id) : CREATE;
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(r=>r.json()).then(r=>{ if(r.success) { bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide(); load(); resetForm(); } });
}
function edit(id) {
  fetch(API).then(r=>r.json()).then(items => {
    const r = items.find(x=>x.id===id); if(!r) return;
    document.getElementById('itemId').value = r.id; document.getElementById('f_code').value = r.code_lot||'';
    document.getElementById('f_produit').value = r.produit_nom||''; document.getElementById('f_fab').value = r.date_fabrication || '';
    document.getElementById('f_exp').value = r.date_expiration || ''; document.getElementById('f_quantite').value = r.quantite||'';
    document.getElementById('f_fournisseur').value = r.fournisseur||''; document.getElementById('f_lot_fournisseur').value = r.lot_fournisseur||'';
    document.getElementById('f_matieres').value = r.matieres_utilisees||''; document.getElementById('f_notes').value = r.notes||'';
    document.getElementById('modalTitle').textContent = 'Modifier le lot';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  });
}
function del(id) { if(!confirm('Supprimer ?')) return; fetch(DELETE.replace('0',id), {method:'POST'}).then(r=>r.json()).then(r=>{if(r.success) load();}); }
function resetForm() { document.getElementById('itemId').value = ''; ['f_code','f_produit','f_fab','f_exp','f_quantite','f_fournisseur','f_lot_fournisseur','f_matieres','f_notes'].forEach(id => document.getElementById(id).value = ''); document.getElementById('modalTitle').textContent = 'Nouveau lot'; }
document.addEventListener('DOMContentLoaded', load);
</script>
{% endblock %}
