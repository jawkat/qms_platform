{% extends 'layout.html' %}

{% block title %}Détail secteur{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="m-0">Secteur: {{ secteur.nom }}</h3>
        <a href="{{ url_for('secteur.liste_secteurs') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Retour à la liste
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="mb-3">
                <div class="text-muted small">Identifiant</div>
                <div class="fw-semibold">{{ secteur.id }}</div>
            </div>

            <div class="mb-3">
                <div class="text-muted small">Nom</div>
                <div class="fw-semibold">{{ secteur.nom }}</div>
            </div>

            <div>
                <div class="text-muted small">Description</div>
                <div>{{ secteur.description or 'Aucune description fournie.' }}</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
