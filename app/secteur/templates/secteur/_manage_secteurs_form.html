<form data-texte-id="{{ texte.id }}" method="post" class="manage-secteurs-form">
  <div class="mb-3">
    <label class="form-label">Texte</label>
    <div class="fw-bold">{{ texte.titre }}</div>
  </div>

  <div class="mb-3">
    <label for="secteur_ids" class="form-label">Secteurs</label>
    <select id="secteur_ids" name="secteur_ids" class="form-select" multiple size="8">
      {% for s in secteurs %}
        <option value="{{ s.id }}" {% if s.id in selected %}selected{% endif %}>{{ s.nom }}</option>
      {% endfor %}
    </select>
    <div class="form-text">Maintenez Ctrl (ou Cmd) pour sélectionner plusieurs éléments.</div>
  </div>

  <div class="d-flex justify-content-end">
    <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Annuler</button>
    <button type="submit" class="btn btn-primary">Appliquer</button>
  </div>
</form>
