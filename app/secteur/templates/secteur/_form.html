<form method="post" action="{% if secteur and secteur.id %}{{ url_for('secteur.edit_secteur', secteur_id=secteur.id) }}{% else %}{{ url_for('secteur.create_secteur') }}{% endif %}">
    <div class="mb-3">
        <label for="nom" class="form-label">Nom</label>
        <input type="text" class="form-control {{ 'is-invalid' if errors.get('nom') }}" id="nom" name="nom" value="{{ secteur.nom if secteur and secteur.nom is not none else '' }}">
        {% if errors.get('nom') %}
        <div class="invalid-feedback">{{ errors.get('nom') }}</div>
        {% endif %}
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ secteur.description if secteur and secteur.description is not none else '' }}</textarea>
    </div>

    <div class="d-flex justify-content-end">
        <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
    </div>
</form>
