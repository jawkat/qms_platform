{% extends 'layout.html' %}
{% block title %}Réclamations{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="fas fa-headset me-2" style="color:#7c3aed;"></i>Réclamations</h1>
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#itemModal"><i class="fas fa-plus me-1"></i>Nouvelle réclamation</button>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr><th>Date</th><th>Client</th><th>Produit</th><th>Type</th><th>Statut</th><th>Responsable</th><th>Actions</th></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="itemModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouvelle réclamation</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="itemId" value="">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label">Date <span class="text-danger">*</span></label><input type="date" id="f_date" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Client <span class="text-danger">*</span></label><input type="text" id="f_client" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Produit</label><input type="text" id="f_produit" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Lot</label><input type="text" id="f_lot" class="form-control"></div>
          <div class="col-md-6"><label class="form-label">Type</label>
            <select id="f_type" class="form-select">
              <option value="qualite">Qualité</option>
              <option value="delai">Délai</option>
              <option value="service">Service</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="col-md-6"><label class="form-label">Responsable</label>
            <select id="f_responsable" class="form-select">
              <option value="">—</option>
              {% for u in utilisateurs %}
              <option value="{{ u.id }}">{{ u.prenom }} {{ u.nom }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-12"><label class="form-label">Description <span class="text-danger">*</span></label><textarea id="f_description" class="form-control" rows="3"></textarea></div>
          <div class="col-12"><label class="form-label">Action</label><textarea id="f_action" class="form-control" rows="2"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-danger" onclick="saveItem()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const API = '{{ url_for("reclamations.api_liste") }}'; const CREATE = '{{ url_for("reclamations.api_creer") }}';
const UPDATE = '{{ url_for("reclamations.api_modifier", item_id=0) }}'; const DELETE = '{{ url_for("reclamations.api_supprimer", item_id=0) }}';
function load() {
  fetch(API).then(r=>r.json()).then(items => {
    const tbody = document.getElementById('tableBody');
    if (!items.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">Aucune réclamation</td></tr>'; return; }
    tbody.innerHTML = items.map(r => `<tr>
      <td>${r.date_reclamation ? new Date(r.date_reclamation).toLocaleDateString('fr-FR') : ''}</td>
      <td>${r.client||''}</td><td>${r.produit||''}</td><td>${r.type_reclamation||''}</td>
      <td><span class="badge bg-${r.statut==='ouverte'?'danger':r.statut==='en_cours'?'warning':'success'}">${r.statut||''}</span></td>
      <td>${r.responsable||''}</td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})"><i class="fas fa-trash"></i></button></td>
    </tr>`).join('');
  });
}
function saveItem() {
  const id = document.getElementById('itemId').value;
  const data = { date_reclamation: document.getElementById('f_date').value, client: document.getElementById('f_client').value,
    produit: document.getElementById('f_produit').value, lot: document.getElementById('f_lot').value,
    type_reclamation: document.getElementById('f_type').value, description: document.getElementById('f_description').value,
    action: document.getElementById('f_action').value, responsable_id: document.getElementById('f_responsable').value };
  const url = id ? UPDATE.replace('0', id) : CREATE;
  fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)})
    .then(r=>r.json()).then(r=>{ if(r.success) { bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide(); load(); resetForm(); } });
}
function edit(id) {
  fetch(API).then(r=>r.json()).then(items => {
    const r = items.find(x=>x.id===id); if(!r) return;
    document.getElementById('itemId').value = r.id; document.getElementById('f_date').value = r.date_reclamation||'';
    document.getElementById('f_client').value = r.client||''; document.getElementById('f_produit').value = r.produit||'';
    document.getElementById('f_lot').value = r.lot||''; document.getElementById('f_type').value = r.type_reclamation||'';
    document.getElementById('f_description').value = r.description||''; document.getElementById('f_action').value = r.action||'';
    document.getElementById('f_responsable').value = r.responsable_id||'';
    document.getElementById('modalTitle').textContent = 'Modifier la réclamation';
    new bootstrap.Modal(document.getElementById('itemModal')).show();
  });
}
function del(id) { if(!confirm('Supprimer ?')) return; fetch(DELETE.replace('0',id), {method:'POST'}).then(r=>r.json()).then(r=>{if(r.success) load();}); }
function resetForm() { document.getElementById('itemId').value = ''; ['f_date','f_client','f_produit','f_lot','f_type','f_description','f_action','f_responsable'].forEach(id => document.getElementById(id).value = ''); document.getElementById('modalTitle').textContent = 'Nouvelle réclamation'; }
document.addEventListener('DOMContentLoaded', load);
</script>
{% endblock %}
