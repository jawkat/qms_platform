<div class="card border-0 shadow-sm h-100">
  <div class="card-body text-center">
    <div class="display-6 text-{{ color|default('primary') }} mb-2">
      <i class="fas {{ icon }}"></i>
    </div>
    <h3 class="fw-bold mb-1">{{ value }}</h3>
    <p class="text-muted mb-0 small">{{ label }}</p>
  </div>
</div>
