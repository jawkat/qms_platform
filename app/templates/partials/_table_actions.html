<div class="btn-group btn-group-sm">
  {% if show_url %}
    <a href="{{ show_url }}" class="btn btn-outline-info" title="Voir">
      <i class="fas fa-eye"></i>
    </a>
  {% endif %}
  {% if edit_url %}
    <a href="{{ edit_url }}" class="btn btn-outline-primary" title="Modifier">
      <i class="fas fa-edit"></i>
    </a>
  {% endif %}
  {% if delete_url %}
    <button type="button" class="btn btn-outline-danger" title="Supprimer"
            data-bs-toggle="modal" data-bs-target="#{{ delete_modal_id }}">
      <i class="fas fa-trash"></i>
    </button>
  {% endif %}
</div>
