{% extends 'layout.html' %}
{% block title %}Page introuvable — QMS Platform{% endblock %}
{% block content %}
<div class="container text-center py-5">
  <div class="mb-4">
    <i class="fas fa-map-signs text-warning" style="font-size:5rem;opacity:.6;"></i>
  </div>
  <h1 class="display-1 fw-bold text-warning mb-2">404</h1>
  <h4 class="text-muted mb-4">Page introuvable</h4>
  <p class="text-muted mb-4" style="max-width:400px;margin:0 auto;">
    La page que vous recherchez n'existe pas ou a été déplacée.
    Vérifiez l'URL ou retournez au tableau de bord.
  </p>
  <a href="{{ url_for('main.tableau_de_bord') }}" class="btn btn-danger">
    <i class="fas fa-arrow-left me-2"></i>Retour au tableau de bord
  </a>
</div>
{% endblock %}
