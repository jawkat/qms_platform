<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstration reservee - HSE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="24" width="24" style="border-radius:4px" class="me-2">QMS Veille HSE
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-sm text-center">
                    <div class="card-body py-5">
                        <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                        <h3 class="mt-3">Demonstration reservee !</h3>
                        <p class="text-muted">
                            Votre demonstration est confirmee pour le
                            <strong>{{ creneau.date_heure_debut.strftime('%d/%m/%Y a %H:%M') }}</strong>.
                        </p>
                        <p class="text-muted">Un email de confirmation vous a ete envoye a <strong>{{ creneau.email_contact }}</strong>.</p>
                        <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-3">
                            <i class="fas fa-home me-1"></i>Retour a l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
