<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserver une demonstration - HSE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: default;
            font-size: 0.9rem;
            transition: .15s;
        }
        .calendar-day.available {
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 600;
            cursor: pointer;
        }
        .calendar-day.available:hover {
            background: #c8e6c9;
            transform: scale(1.05);
        }
        .calendar-day.selected {
            background: #0d6efd !important;
            color: #fff !important;
        }
        .calendar-day.disabled {
            color: #ccc;
        }
        .calendar-day.today {
            outline: 2px solid #0d6efd;
            outline-offset: 2px;
        }
        .slot-btn {
            min-width: 70px;
            transition: .15s;
        }
        .slot-btn.selected {
            background: #0d6efd !important;
            color: #fff !important;
            border-color: #0d6efd !important;
        }
        .month-nav {
            font-size: 1.1rem;
            font-weight: 600;
        }
        #slots-panel {
            min-height: 80px;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" height="24" width="24" style="border-radius:4px" class="me-2">QMS Veille HSE
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0"><i class="fas fa-calendar-alt me-2"></i>Reserver une demonstration</h4>
                        <p class="mb-0 small opacity-75">Choisissez une date puis un creneau</p>
                    </div>
                    <div class="card-body">
                        {% if errors %}
                        <div class="alert alert-danger">
                            <ul class="mb-0">
                                {% for e in errors %}
                                <li>{{ e }}</li>
                                {% endfor %}
                            </ul>
                        </div>
                        {% endif %}

                        <form method="POST" id="bookingForm">
                            <div class="row g-4">
                                <div class="col-md-7">
                                    <div class="d-flex align-items-center justify-content-between mb-2">
                                        <button type="button" class="btn btn-sm btn-outline-secondary" id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                                        <span class="month-nav" id="monthLabel"></span>
                                        <button type="button" class="btn btn-sm btn-outline-secondary" id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                                    </div>
                                    <div class="row g-1 mb-2 text-center small fw-bold text-secondary">
                                        <div class="col">Lun</div>
                                        <div class="col">Mar</div>
                                        <div class="col">Mer</div>
                                        <div class="col">Jeu</div>
                                        <div class="col">Ven</div>
                                        <div class="col">Sam</div>
                                        <div class="col">Dim</div>
                                    </div>
                                    <div id="calendarGrid" class="row g-1"></div>
                                </div>

                                <div class="col-md-5">
                                    <div id="slots-panel" class="border rounded p-3 bg-white">
                                        <p class="text-muted text-center mb-0" id="slots-placeholder">
                                            <i class="fas fa-hand-pointer me-1"></i>Selectionnez une date
                                        </p>
                                        <div id="slots-list" class="d-none">
                                            <p class="fw-semibold mb-2" id="selected-date-label"></p>
                                            <div class="d-flex flex-wrap gap-2" id="slots-buttons"></div>
                                        </div>
                                    </div>

                                    <input type="hidden" name="creneau" id="creneau-input">

                                    <div class="mt-3">
                                        <div class="mb-2">
                                            <label class="form-label small fw-semibold">Nom *</label>
                                            <input type="text" name="nom" class="form-control form-control-sm" value="{{ nom or '' }}" required>
                                        </div>
                                        <div class="mb-2">
                                            <label class="form-label small fw-semibold">Email *</label>
                                            <input type="email" name="email" class="form-control form-control-sm" value="{{ email or '' }}" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label small fw-semibold">Entreprise</label>
                                            <input type="text" name="entreprise" class="form-control form-control-sm" value="{{ entreprise or '' }}">
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100" id="submit-btn" disabled>
                                            <i class="fas fa-check me-1"></i>Reserver
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const slotsData = {{ slots_json|safe }};
    const today = new Date();
    today.setHours(0,0,0,0);

    let currentMonth = today.getMonth();
    let currentYear = today.getFullYear();
    let selectedDate = null;

    const months = ['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'];

    function parseDate(str) {
        const p = str.split('-');
        return new Date(+p[0], +p[1]-1, +p[2]);
    }

    function isAvailable(dateStr) {
        return slotsData.hasOwnProperty(dateStr);
    }

    function daysInMonth(m, y) {
        return new Date(y, m+1, 0).getDate();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        document.getElementById('monthLabel').textContent = months[currentMonth] + ' ' + currentYear;

        const firstDow = new Date(currentYear, currentMonth, 1).getDay();
        const offset = firstDow === 0 ? 6 : firstDow - 1;
        const totalDays = daysInMonth(currentMonth, currentYear);

        for (let i = 0; i < offset; i++) {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = '<div class="calendar-day disabled"></div>';
            grid.appendChild(col);
        }

        for (let d = 1; d <= totalDays; d++) {
            const dt = new Date(currentYear, currentMonth, d);
            const dateStr = dt.toISOString().slice(0,10);
            const col = document.createElement('div');
            col.className = 'col';

            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            dayDiv.textContent = d;

            if (dt < today) {
                dayDiv.classList.add('disabled');
            } else if (isAvailable(dateStr)) {
                dayDiv.classList.add('available');
                dayDiv.dataset.date = dateStr;
                dayDiv.addEventListener('click', () => selectDate(dateStr, dayDiv));
            } else {
                dayDiv.classList.add('disabled');
            }

            if (dt.toDateString() === today.toDateString()) {
                dayDiv.classList.add('today');
            }
            if (selectedDate === dateStr) {
                dayDiv.classList.add('selected');
            }

            col.appendChild(dayDiv);
            grid.appendChild(col);
        }

        const totalCells = offset + totalDays;
        const rem = (7 - totalCells % 7) % 7;
        for (let i = 0; i < rem; i++) {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = '<div class="calendar-day disabled"></div>';
            grid.appendChild(col);
        }
    }

    function selectDate(dateStr, el) {
        document.querySelectorAll('.calendar-day.selected').forEach(d => d.classList.remove('selected'));
        if (el) el.classList.add('selected');
        selectedDate = dateStr;

        const slots = slotsData[dateStr];
        const panel = document.getElementById('slots-panel');
        const placeholder = document.getElementById('slots-placeholder');
        const list = document.getElementById('slots-list');
        const label = document.getElementById('selected-date-label');
        const btns = document.getElementById('slots-buttons');

        const d = parseDate(dateStr);
        label.textContent = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

        btns.innerHTML = '';
        slots.forEach(t => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'btn btn-outline-primary btn-sm slot-btn';
            btn.textContent = t;
            btn.dataset.datetime = dateStr + 'T' + t;
            btn.addEventListener('click', () => selectSlot(btn));
            btns.appendChild(btn);
        });

        placeholder.classList.add('d-none');
        list.classList.remove('d-none');
        document.getElementById('creneau-input').value = '';
        document.getElementById('submit-btn').disabled = true;
    }

    function selectSlot(btn) {
        document.querySelectorAll('.slot-btn.selected').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('creneau-input').value = btn.dataset.datetime;
        document.getElementById('submit-btn').disabled = false;
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
        else { currentMonth--; }
        renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
        else { currentMonth++; }
        renderCalendar();
    });

    renderCalendar();
    </script>
</body>
</html>
