{% extends 'layout.html' %}
{% set is_landing = True %}
{% block title %}Nouveau mot de passe{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 420px;">
    <div class="card-body p-4">
      <h4 class="text-center mb-2"><i class="fas fa-shield-alt text-danger me-2"></i>QMS Platform</h4>
      <p class="text-center text-muted mb-4">Choisissez un nouveau mot de passe</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <input type="password" name="password" class="form-control" required minlength="8" placeholder="Minimum 8 caractères">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmer</label>
          <input type="password" name="confirm_password" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-danger w-100">Réinitialiser</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
