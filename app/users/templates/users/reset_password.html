{% extends 'layout.html' %}
{% set is_landing = True %}
{% block title %}Nouveau mot de passe{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 420px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="fas fa-key text-danger" style="font-size:2rem;"></i>
        <h4 class="mt-2 mb-1">Nouveau mot de passe</h4>
        <p class="text-muted small mb-0">Choisissez un mot de passe sécurisé</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <div class="password-wrapper">
            <input type="password" name="password" class="form-control" required minlength="8" placeholder="Minimum 8 caractères">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmer</label>
          <div class="password-wrapper">
            <input type="password" name="confirm_password" class="form-control" required minlength="8" placeholder="Confirmer le mot de passe">
          </div>
        </div>
        <button type="submit" class="btn btn-danger w-100"><i class="fas fa-check me-1"></i>Réinitialiser</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
