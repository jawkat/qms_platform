{% extends 'layout.html' %}
{% set is_landing = True %}
{% block title %}Mot de passe oublié{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 420px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="fas fa-lock text-danger" style="font-size:2rem;"></i>
        <h4 class="mt-2 mb-1">Mot de passe oublié ?</h4>
        <p class="text-muted small mb-0">Entrez votre email pour recevoir un lien de réinitialisation</p>
      </div>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" name="email" class="form-control" required placeholder="votre@email.com">
          </div>
        </div>
        <button type="submit" class="btn btn-danger w-100"><i class="fas fa-paper-plane me-1"></i>Envoyer le lien</button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('users.login') }}" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
