{% extends 'layout.html' %}
{% set is_landing = True %}
{% block title %}Mot de passe oublié{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow" style="width: 420px;">
    <div class="card-body p-4">
      <h4 class="text-center mb-2"><i class="fas fa-shield-alt text-danger me-2"></i>QMS Platform</h4>
      <p class="text-center text-muted mb-4">Entrez votre email pour recevoir un lien de réinitialisation</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required placeholder="votre@email.com">
        </div>
        <button type="submit" class="btn btn-danger w-100">Envoyer le lien</button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('users.login') }}" class="text-muted small">Retour à la connexion</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
