{% extends 'layout.html' %}
{% block title %}Changer le mot de passe{% endblock %}
{% block content %}
<div class="container-fluid">
  <h1 class="h3 mb-4"><i class="fas fa-key me-2 text-danger"></i>Changer le mot de passe</h1>
  <div class="card border-0 shadow-sm" style="max-width: 520px;">
    <div class="card-body">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Mot de passe actuel</label>
          <div class="password-wrapper">
            <input type="password" name="current_password" class="form-control" required placeholder="Votre mot de passe actuel">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <div class="password-wrapper">
            <input type="password" name="new_password" class="form-control" required minlength="8" placeholder="Minimum 8 caractères">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmer le nouveau mot de passe</label>
          <div class="password-wrapper">
            <input type="password" name="confirm_password" class="form-control" required minlength="8" placeholder="Confirmer le mot de passe">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger"><i class="fas fa-check me-1"></i>Modifier</button>
          <a href="{{ url_for('users.profile') }}" class="btn btn-outline-secondary"><i class="fas fa-times me-1"></i>Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
