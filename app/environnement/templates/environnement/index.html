{% extends 'layout.html' %}
{% block title %}Environnement / ISO 14001{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="fas fa-leaf me-2 text-success"></i>Environnement / ISO 14001</h4>
    <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#itemModal"><i class="fas fa-plus me-1"></i>Nouvel aspect</button>
  </div>
  <div class="row g-3 mb-3">
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body text-center py-2">
      <h6 class="text-muted text-uppercase small">Total</h6><div class="h3 mb-0 fw-bold" id="stat-total">-</div></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body text-center py-2">
      <h6 class="text-muted text-uppercase small">Critiques</h6><div class="h3 mb-0 fw-bold text-danger" id="stat-critiques">-</div></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body text-center py-2">
      <h6 class="text-muted text-uppercase small">Suivis</h6><div class="h3 mb-0 fw-bold text-info" id="stat-suivis">-</div></div></div></div>
  </div>
  <div class="card border-0 shadow-sm"><div class="card-body p-0">
    <div class="table-responsive"><table class="table table-hover mb-0 align-middle">
      <thead class="table-light"><tr><th>Nom</th><th>Catégorie</th><th>Impact</th><th>Gravité</th><th>Responsable</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table></div>
  </div></div>
</div>
<div class="modal fade" id="itemModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouvel aspect environnemental</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body"><input type="hidden" id="itemId">
    <div class="mb-3"><label class="form-label">Nom <span class="text-danger">*</span></label><input type="text" id="f_nom" class="form-control"></div>
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label">Catégorie</label><select id="f_categorie" class="form-select"><option value="">—</option><option value="dechets">Déchets</option><option value="emission">Émissions</option><option value="eau">Eau</option><option value="energie">Énergie</option><option value="bruit">Bruit</option></select></div>
      <div class="col-md-6"><label class="form-label">Gravité</label><select id="f_gravite" class="form-select"><option value="faible">Faible</option><option value="moyenne" selected>Moyenne</option><option value="forte">Forte</option><option value="critique">Critique</option></select></div>
    </div>
    <div class="mb-3"><label class="form-label">Description</label><textarea id="f_description" class="form-control" rows="2"></textarea></div>
    <div class="mb-3"><label class="form-label">Impact</label><textarea id="f_impact" class="form-control" rows="2"></textarea></div>
    <div class="mb-3"><label class="form-label">Mesures de maîtrise</label><textarea id="f_maitrise" class="form-control" rows="2"></textarea></div>
    <div class="mb-3"><label class="form-label">Responsable</label><input type="text" id="f_responsable" class="form-control"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Annuler</button><button class="btn btn-danger btn-sm" onclick="saveItem()">Enregistrer</button></div>
</div></div></div>
{% endblock %}
{% block scripts %}
<script>
const API='{{ url_for("environnement.api_liste") }}',CREATE='{{ url_for("environnement.api_creer") }}',UPDATE='{{ url_for("environnement.api_modifier",item_id=0) }}',DELETE='{{ url_for("environnement.api_supprimer",item_id=0) }}',STATS='{{ url_for("environnement.api_stats") }}';
var _items=[];
function load(){Promise.all([fetch(API).then(r=>r.json()),fetch(STATS).then(r=>r.json())]).then(([items,stats])=>{_items=items;document.getElementById('stat-total').textContent=stats.total_aspects;document.getElementById('stat-critiques').textContent=stats.critiques;document.getElementById('stat-suivis').textContent=stats.suivis;var tb=document.getElementById('tableBody');if(!items.length){tb.innerHTML='<tr><td colspan="7" class="text-center text-muted py-4">Aucun aspect</td></tr>';return}tb.innerHTML=items.map(r=>`<tr><td><strong>${r.nom}</strong></td><td><span class="badge bg-secondary">${r.categorie||'-'}</span></td><td>${(r.impact||'').substring(0,50)}</td><td><span class="badge bg-${r.gravite==='critique'?'danger':r.gravite==='forte'?'warning':'info'}">${r.gravite||'-'}</span></td><td>${r.responsable||'-'}</td><td><span class="badge bg-${r.statut==='actif'?'success':'secondary'}">${r.statut||'-'}</span></td><td><button class="btn btn-sm btn-outline-primary" onclick="edit(${r.id})"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="del(${r.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')})}
function saveItem(){const id=document.getElementById('itemId').value;const d={nom:document.getElementById('f_nom').value,description:document.getElementById('f_description').value,categorie:document.getElementById('f_categorie').value,gravite:document.getElementById('f_gravite').value,impact:document.getElementById('f_impact').value,maitrise:document.getElementById('f_maitrise').value,responsable:document.getElementById('f_responsable').value};fetch(id?UPDATE.replace('0',id):CREATE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()).then(r=>{if(r.success){bootstrap.Modal.getInstance(document.getElementById('itemModal')).hide();load();resetForm()}})}
function edit(id){const r=_items.find(x=>x.id===id);if(!r)return;document.getElementById('itemId').value=r.id;document.getElementById('f_nom').value=r.nom||'';document.getElementById('f_description').value=r.description||'';document.getElementById('f_categorie').value=r.categorie||'';document.getElementById('f_gravite').value=r.gravite||'moyenne';document.getElementById('f_impact').value=r.impact||'';document.getElementById('f_maitrise').value=r.maitrise||'';document.getElementById('f_responsable').value=r.responsable||'';document.getElementById('modalTitle').textContent='Modifier';new bootstrap.Modal(document.getElementById('itemModal')).show()}
function del(id){if(!confirm('Supprimer ?'))return;fetch(DELETE.replace('0',id),{method:'POST'}).then(r=>r.json()).then(r=>{if(r.success)load()})}
function resetForm(){document.getElementById('itemId').value='';['f_nom','f_description','f_impact','f_maitrise','f_responsable'].forEach(id=>document.getElementById(id).value='');['f_categorie','f_gravite'].forEach(id=>document.getElementById(id).selectedIndex=0);document.getElementById('modalTitle').textContent='Nouvel aspect'}
document.addEventListener('DOMContentLoaded',load);
</script>
{% endblock %}
