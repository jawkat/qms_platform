services:
  db:
    image: postgres:16-alpine
    container_name: qms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qms_platform
      POSTGRES_USER: qms_user
      POSTGRES_PASSWORD: qms_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms_user -d qms_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: qms_redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  app:
    build: .
    container_name: qms_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5005
    ports:
      - "5006:5005"
    volumes:
      - .:/app
      - uploads_data:/app/uploads

volumes:
  pgdata:
  uploads_data:
