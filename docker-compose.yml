# =============================================================================
# QMS Platform — Docker Compose
# =============================================================================
#
# Services :
#   - db:        PostgreSQL 16 (port 5433)
#   - redis:     Redis 7 (port 6380)
#   - minio:     MINIO S3-compatible storage (port 9000 API, 9001 Console)
#   - app:       Flask application (port 5006)
#
# Démarrage :
#   docker-compose up -d
#
# Arrêt :
#   docker-compose down
#
# Réinitialiser les données :
#   docker-compose down -v && docker-compose up -d
#
# =============================================================================

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16 — Base de données principale
  # -------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: qms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qms_platform
      POSTGRES_USER: qms_user
      POSTGRES_PASSWORD: qms_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms_user -d qms_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # Redis 7 — Cache et tâches asynchrones
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: qms_redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  # -------------------------------------------------------------------------
  # MINIO — Stockage objet S3-compatible
  # -------------------------------------------------------------------------
  # Console web : http://localhost:9001
  # API S3 : http://localhost:9000
  # Bucket par défaut : qms-platform
  # Credentials définis dans .env (MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
  minio:
    image: minio/minio:latest
    container_name: qms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9002:9001"   # Console web
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Flask Application
  # -------------------------------------------------------------------------
  app:
    build: .
    container_name: qms_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5005
    ports:
      - "5006:5005"
    volumes:
      - .:/app
      - uploads_data:/app/uploads

  # -------------------------------------------------------------------------
  # RQ Worker — Tâches asynchrones (emails, alertes, exports)
  # -------------------------------------------------------------------------
  worker:
    build: .
    container_name: qms_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - .:/app
    command: python run_worker.py

# =============================================================================
# Volumes persistants
# =============================================================================
volumes:
  pgdata:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local
